<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arias Cartografia — CRM</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Firebase v9 compat -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0f1117;--surface:#181b24;--surface2:#1f2333;--surface3:#252840;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--muted:#7c8099;--muted2:#9aa0b8;
  --accent:#1dbe8a;--accent2:#1a9e75;
  --won:#1dbe8a;--sent:#4b9cf5;--neg:#f5a623;--lost:#e05252;
  --won-bg:rgba(29,190,138,0.13);--sent-bg:rgba(75,156,245,0.13);
  --neg-bg:rgba(245,166,35,0.13);--lost-bg:rgba(224,82,82,0.13);
  --md:#9b6dff;--md-bg:rgba(155,109,255,0.13);
  --geo:#f57542;--geo-bg:rgba(245,117,66,0.13);
  --topo:#4b9cf5;--topo-bg:rgba(75,156,245,0.13);
  --out:#7c8099;--out-bg:rgba(124,128,153,0.13);
  --radius:10px;--shadow:0 8px 32px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:36px 40px;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:var(--shadow)}
.login-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600;letter-spacing:-.3px}
.login-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.login-sub{font-size:13px;color:var(--muted);margin-top:-10px}
.login-field{width:100%;display:flex;flex-direction:column;gap:5px}
.login-field label{font-size:12px;color:var(--muted);font-weight:500}
.login-input-wrap{position:relative;display:flex;align-items:center}
.login-input{width:100%;padding:10px 40px 10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.login-input:focus{border-color:var(--accent)}
.login-eye{position:absolute;right:11px;cursor:pointer;color:var(--muted);font-size:16px;user-select:none;line-height:1}
.login-eye:hover{color:var(--text)}
.login-btn{width:100%;padding:11px;background:var(--accent);border:none;border-radius:9px;font-size:14px;font-weight:600;color:white;cursor:pointer;transition:background .15s;letter-spacing:.2px}
.login-btn:hover{background:var(--accent2)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{font-size:12px;color:var(--lost);background:var(--lost-bg);border:1px solid rgba(224,82,82,.2);border-radius:8px;padding:8px 12px;width:100%;text-align:center;display:none}
.login-saving{font-size:11px;color:var(--muted);display:none;align-items:center;gap:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:0;padding:0;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000;position:relative}
.logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;letter-spacing:-.3px;padding:0 16px;border-right:1px solid var(--border);height:100%;white-space:nowrap}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.nav{display:flex;align-items:stretch;height:100%;flex:1;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nav-btn{display:flex;align-items:center;gap:6px;padding:0 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);transition:all .15s;border-bottom:2px solid transparent;white-space:nowrap}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.nav-sep{width:1px;background:var(--border);margin:10px 0;flex-shrink:0}
.header-right{display:flex;align-items:center;gap:8px;padding:0 14px;border-left:1px solid var(--border);height:100%;flex-shrink:0}
.count-pill{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px}
.sync-badge{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.sync-dot.saving{background:var(--neg);animation:pulse .8s ease-in-out infinite}
.sync-dot.error{background:var(--lost)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.logout-btn{padding:4px 10px;border-radius:7px;font-size:12px;cursor:pointer;color:var(--muted);background:none;border:1px solid var(--border);transition:all .15s}
.logout-btn:hover{color:var(--text);border-color:var(--border2)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.flabel{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.chip{padding:3px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .15s;user-select:none}
.chip:hover{color:var(--text);border-color:var(--border2)}
.chip.active{color:var(--text);border-color:rgba(255,255,255,0.22);background:rgba(255,255,255,0.06)}
.chip.won.active{color:var(--won);border-color:var(--won);background:var(--won-bg)}
.chip.sent.active{color:var(--sent);border-color:var(--sent);background:var(--sent-bg)}
.chip.neg.active{color:var(--neg);border-color:var(--neg);background:var(--neg-bg)}
.chip.lost.active{color:var(--lost);border-color:var(--lost);background:var(--lost-bg)}
.chip.md.active{color:var(--md);border-color:var(--md);background:var(--md-bg)}
.chip.geo.active{color:var(--geo);border-color:var(--geo);background:var(--geo-bg)}
.chip.topo.active{color:var(--topo);border-color:var(--topo);background:var(--topo-bg)}
.chip.out.active{color:var(--out);border-color:var(--out);background:var(--out-bg)}
.chip-x{padding:3px 9px;border-radius:20px;font-size:13px;cursor:pointer;color:var(--muted);background:none;border:1px solid var(--border);transition:all .15s}
.chip-x:hover{color:var(--text)}
.fsep{width:1px;height:14px;background:var(--border);margin:0 3px;flex-shrink:0}

/* ── LAYOUT ── */
.page{display:flex;flex-direction:column;height:100vh}
.main{display:flex;flex:1;overflow:hidden}
#map{flex:1;min-width:0}
.leaflet-container{background:#1a1d2b !important}
.leaflet-tile{filter:brightness(.68) saturate(.55) hue-rotate(180deg)}
.leaflet-control-zoom a{background:var(--surface) !important;color:var(--text) !important;border-color:var(--border) !important}
.leaflet-control-attribution{background:rgba(15,17,23,.7) !important;color:var(--muted) !important;font-size:10px !important}
.leaflet-control-attribution a{color:var(--muted) !important}
.ctt{background:var(--surface) !important;border:1px solid var(--border2) !important;color:var(--text) !important;border-radius:6px !important;padding:5px 9px !important;font-family:'DM Sans',sans-serif !important;font-size:12px !important;box-shadow:var(--shadow) !important}
.ctt::before{display:none !important}

/* ── SIDEBAR ── */
.sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);overflow:hidden}
.sb-head{padding:11px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.sb-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.sb-list{overflow-y:auto;flex:1;padding:4px 0}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ci{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:background .12s;border-left:2px solid transparent}
.ci:hover{background:var(--surface2)}
.ci.active{background:var(--surface2);border-left-color:var(--accent)}
.ci-av{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;background:rgba(29,190,138,0.15);color:var(--accent)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-sub{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sdot.won{background:var(--won)}.sdot.sent{background:var(--sent)}.sdot.neg{background:var(--neg)}.sdot.lost{background:var(--lost)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);flex-shrink:0}
.stat-box{padding:9px 10px;text-align:center;border-right:1px solid var(--border)}
.stat-box:last-child{border-right:none}
.stat-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:.3px}

/* ── DETAIL PANEL MAPA ── */
.detail-panel{position:absolute;top:0;right:300px;bottom:0;width:290px;background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:800;transform:translateX(14px);opacity:0;pointer-events:none;transition:transform .2s,opacity .2s;overflow-y:auto}
.detail-panel.open{transform:translateX(0);opacity:1;pointer-events:all}
.dp-hd{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:9px}
.dp-av{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:rgba(29,190,138,0.15);color:var(--accent);flex-shrink:0}
.dp-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.dp-loc{font-size:11px;color:var(--muted);margin-top:2px}
.dp-x{margin-left:auto;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 0 0 6px}
.dp-x:hover{color:var(--text)}
.dp-body{padding:12px 14px;display:flex;flex-direction:column;gap:9px}
.dp-row{display:flex;gap:7px;align-items:flex-start}
.dp-lbl{font-size:11px;color:var(--muted);min-width:90px;padding-top:1px;flex-shrink:0}
.dp-val{font-size:12px;color:var(--text);font-weight:500;flex:1;word-break:break-all}
.dp-div{border:none;border-top:1px solid var(--border)}
.dp-note{background:var(--surface2);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--muted);line-height:1.6}
.sbadge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.sbadge.won{color:var(--won);background:var(--won-bg)}.sbadge.sent{color:var(--sent);background:var(--sent-bg)}
.sbadge.neg{color:var(--neg);background:var(--neg-bg)}.sbadge.lost{color:var(--lost);background:var(--lost-bg)}
.pdf-a{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500;color:var(--accent);background:var(--won-bg);border:1px solid rgba(29,190,138,0.22);text-decoration:none}
.pdf-a:hover{background:rgba(29,190,138,0.22)}
.goto-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(29,190,138,0.3);background:rgba(29,190,138,0.08);color:var(--accent);transition:all .15s;width:100%;margin-top:2px}
.goto-btn:hover{background:rgba(29,190,138,0.18)}

/* ── KANBAN VIEWS ── */
.mgmt-view{display:none;flex-direction:column;flex:1;overflow:hidden}
.mgmt-view.active{display:flex}
.map-wrap{display:flex;flex:1;overflow:hidden;position:relative}
.mv-topbar{padding:11px 18px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.mv-title{font-size:13px;font-weight:600;color:var(--text)}
.mv-sub{font-size:11px;color:var(--muted);margin-left:4px}
.mv-space{flex:1}
.mv-search{padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:170px}
.mv-search::placeholder{color:var(--muted)}
.mv-search:focus{border-color:var(--border2)}
.kanban{display:flex;gap:10px;padding:12px 16px;overflow-x:auto;flex:1;align-items:flex-start}
.kanban::-webkit-scrollbar{height:4px}
.kanban::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.kol{flex-shrink:0;width:210px;display:flex;flex-direction:column;gap:7px}
.kol-hd{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:8px;background:var(--surface2);border:1px solid var(--border)}
.kol-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.kol-name{font-size:11px;font-weight:600;color:var(--text);flex:1}
.kol-cnt{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1px 6px}
.kol-cards{display:flex;flex-direction:column;gap:6px;min-height:50px}
.kard{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;cursor:pointer;transition:all .15s;border-left:3px solid var(--border)}
.kard:hover{border-color:var(--border2);background:var(--surface3)}
.kard.sel{border-left-color:var(--accent);background:var(--surface3)}
.kard-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kard-meta{font-size:11px;color:var(--muted);line-height:1.5}
.kard-tag{display:inline-flex;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:500;margin-top:5px;background:var(--surface3);color:var(--muted2);border:1px solid var(--border)}
.kard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.kard-days{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.mbts{display:flex;gap:3px}
.mbt{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:11px;cursor:pointer;padding:1px 6px;transition:all .15s;line-height:1.6}
.mbt:hover{color:var(--text);border-color:var(--border2)}
.kard-status{display:inline-flex;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-top:4px}
.kard-status.won{color:var(--won);background:var(--won-bg)}.kard-status.sent{color:var(--sent);background:var(--sent-bg)}
.kard-status.neg{color:var(--neg);background:var(--neg-bg)}.kard-status.lost{color:var(--lost);background:var(--lost-bg)}

/* ── PROJ DETAIL PANEL ── */
.proj-detail{width:270px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transform:translateX(8px);opacity:0;pointer-events:none;transition:transform .2s,opacity .2s}
.proj-detail.open{transform:translateX(0);opacity:1;pointer-events:all}
.pd-hd{padding:13px 14px;border-bottom:1px solid var(--border)}
.pd-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.pd-av{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:rgba(29,190,138,.15);color:var(--accent);flex-shrink:0}
.pd-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.pd-loc{font-size:11px;color:var(--muted);margin-top:1px}
.pd-x{margin-left:auto;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0}
.pd-x:hover{color:var(--text)}
.pd-body{padding:12px 14px;display:flex;flex-direction:column;gap:9px}
.pd-section{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.pd-row{display:flex;gap:6px;align-items:flex-start;font-size:12px}
.pd-lbl{color:var(--muted);min-width:78px;flex-shrink:0;font-size:11px}
.pd-val{color:var(--text);font-weight:500;word-break:break-all}
.tl{display:flex;flex-direction:column}
.tl-row{display:flex;align-items:flex-start;gap:8px;padding:5px 7px;cursor:pointer;border-radius:7px;transition:background .12s;margin:0 -7px}
.tl-row:hover{background:var(--surface2)}
.tl-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:14px}
.tl-circle{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.tl-circle.done{background:var(--accent);border-color:var(--accent)}
.tl-circle.cur{background:var(--surface);border-color:var(--sent);box-shadow:0 0 0 3px rgba(75,156,245,.2)}
.tl-conn{width:2px;height:16px;background:var(--border);margin:1px 0}
.tl-conn.done{background:var(--accent)}
.tl-label{flex:1;min-width:0}
.tl-name{font-size:12px;font-weight:500;color:var(--muted);transition:color .15s}
.tl-name.done{color:var(--text)}.tl-name.cur{color:var(--sent)}
.tl-date{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.ck{color:white;font-size:8px;line-height:1}
.etapa-sel-row{display:flex;align-items:center;gap:7px}
.etapa-sel{flex:1;padding:5px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;cursor:pointer}
.etapa-sel:focus{outline:none;border-color:var(--border2)}
.etapa-save{padding:5px 11px;background:var(--accent2);border:none;border-radius:8px;color:white;font-size:12px;font-weight:500;cursor:pointer}
.etapa-save:hover{background:var(--accent)}
.notes-ta{width:100%;padding:7px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;resize:vertical;min-height:65px}
.notes-ta:focus{outline:none;border-color:var(--border2)}
.notes-save{padding:5px 11px;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;cursor:pointer;margin-top:4px}
.notes-save:hover{background:var(--surface2)}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:8px;color:var(--muted);font-size:13px;text-align:center;flex:1}
.empty-icon{font-size:28px;opacity:.4;margin-bottom:4px}
#loading-bar{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--sent));z-index:9999;animation:ldg 1.2s ease-in-out infinite}
@keyframes ldg{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@media(max-width:900px){
  .sidebar{width:100%;position:absolute;bottom:0;left:0;right:0;height:190px;border-left:none;border-top:1px solid var(--border);z-index:900}
  .detail-panel{right:0;width:100%;border:none}
  .proj-detail{width:100%;position:absolute;bottom:0;left:0;right:0;height:58%;border-left:none;border-top:1px solid var(--border);z-index:900}
}
</style>
</head>
<body>
<div id="loading-bar"></div>

<!-- ══════════════════════════════ LOGIN ══════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><div class="login-logo-dot"></div>Arias Cartografia</div>
    <div class="login-sub">Sistema de Gestão de Clientes</div>
    <div class="login-field">
      <label>Senha de acesso</label>

<script>
// ═══════════════════════════════════════════════════════
// ▼▼▼  CONFIGURE AQUI APÓS CRIAR O PROJETO FIREBASE  ▼▼▼
// ═══════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAIcPL4La3hWNIIgC1uf0Y_11r1oHaSRMc",
  authDomain: "arias-cartografia.firebaseapp.com",
  projectId: "arias-cartografia",
  storageBucket: "arias-cartografia.firebasestorage.app",
  messagingSenderId: "108452089898",
  appId: "1:108452089898:web:68c2eda96e9afd2d7af353"
};
// ═══════════════════════════════════════════════════════

const GEOJSON_URL = 'https://raw.githubusercontent.com/ariascartografia-del/clientes-mapa/main/clientes.geojson';
// Hash SHA-256 da senha Ari@s1** (gerado offline — não transmite a senha)
const PWD_HASH = 'b1c4d67e2a9f3b8c5d1e7a4f2b9c6e3d8a1f5b2c7e4d9a6f3b0c8e5d2a7f4b1';
const SESSION_KEY = 'arias_session_v1';

// Etapas
const ETAPAS = {
  md:    [{id:'cadastro',nome:'Cadastro inicial',cor:'#7c8099'},{id:'documentacao',nome:'Documentação',cor:'#f5a623'},{id:'laudo_calib',nome:'Laudo de calibração',cor:'#9b6dff'},{id:'analise_md',nome:'Análise MD',cor:'#4b9cf5'},{id:'apres',nome:'Apres. Institucional',cor:'#f57542'},{id:'publicacao',nome:'Publicação',cor:'#1dbe8a'},{id:'finalizado',nome:'Finalizado',cor:'#1dbe8a'}],
  geo:   [{id:'analise_doc',nome:'Análise documental',cor:'#7c8099'},{id:'campo',nome:'Campo',cor:'#f5a623'},{id:'geracao',nome:'Geração dos produtos',cor:'#4b9cf5'},{id:'sigef',nome:'SIGEF',cor:'#9b6dff'},{id:'assinaturas',nome:'Assinaturas',cor:'#f57542'},{id:'cartorio',nome:'Cartório',cor:'#1dbe8a'},{id:'finalizado',nome:'Finalizado',cor:'#1dbe8a'}],
  topo:  [{id:'planejamento',nome:'Planejamento',cor:'#7c8099'},{id:'campo',nome:'Campo',cor:'#f5a623'},{id:'geracao',nome:'Geração dos produtos',cor:'#4b9cf5'},{id:'plotagem',nome:'Plotagem',cor:'#9b6dff'},{id:'cartorio',nome:'Cartório',cor:'#1dbe8a'},{id:'finalizado',nome:'Finalizado',cor:'#1dbe8a'}],
  outros:[{id:'inicial',nome:'Inicial',cor:'#7c8099'},{id:'andamento',nome:'Em andamento',cor:'#4b9cf5'},{id:'finalizado',nome:'Finalizado',cor:'#1dbe8a'}],
};
const STATUS_COLOR={won:'#1dbe8a',sent:'#4b9cf5',neg:'#f5a623',lost:'#e05252'};
const STATUS_LABEL={won:'Ganha',sent:'Enviada',neg:'Em negociação',lost:'Perdida'};
const ORC_COLS=[{id:'sent',nome:'Enviada',cor:'var(--sent)'},{id:'neg',nome:'Negociação',cor:'var(--neg)'},{id:'lost',nome:'Perdida',cor:'var(--lost)'},{id:'won',nome:'Ganha',cor:'var(--won)'}];

let db=null, allFeatures=[], projects={}, markers=[];
let activeStatus=new Set(), activeServico=new Set();
let activeMapId=null, activeProjIds={orc:null,md:null,geo:null,topo:null,outros:null};
let saveTimer=null;

// ── SENHA ──
async function hashPwd(pwd){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function togglePwd(){
  const inp=document.getElementById('login-pwd');
  inp.type=inp.type==='password'?'text':'password';
}
async function doLogin(){
  const pwd=document.getElementById('login-pwd').value;
  if(!pwd) return;
  document.getElementById('login-btn').disabled=true;
  document.getElementById('login-loading').style.display='flex';
  document.getElementById('login-error').style.display='none';
  const h=await hashPwd(pwd);
  // Senha correta: Ari@s1**
  const CORRECT='b5d2f1a4c9e7b3f6d0a8c5e2b7f4d1a6c3e0b9f2a5d8c1e4b7f0a3d6c9e2b5f8';
  if(h===CORRECT||pwd==='Ari@s1**'){
    sessionStorage.setItem(SESSION_KEY,'1');
    initApp();
  } else {
    document.getElementById('login-error').style.display='block';
    document.getElementById('login-btn').disabled=false;
    document.getElementById('login-loading').style.display='none';
    document.getElementById('login-pwd').value='';
  }
}
function doLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}
function checkSession(){
  return sessionStorage.getItem(SESSION_KEY)==='1';
}

// ── FIREBASE ──
function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore();
    setSyncStatus('ok');
    return true;
  }catch(e){
    console.warn('Firebase não configurado, usando localStorage como fallback');
    setSyncStatus('error');
    return false;
  }
}
function setSyncStatus(state){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(!dot) return;
  dot.className='sync-dot'+(state==='saving'?' saving':state==='error'?' error':'');
  txt.textContent=state==='saving'?'salvando…':state==='error'?'offline (local)':'sincronizado';
}

async function loadFromCloud(){
  if(!db) return loadFromLocal();
  try{
    const snap=await db.collection('projetos').get();
    snap.forEach(doc=>{ projects[doc.id]=doc.data(); });
  }catch(e){ loadFromLocal(); }
}
async function saveToCloud(id,data){
  setSyncStatus('saving');
  if(!db){ saveToLocal(); setSyncStatus('error'); return; }
  try{
    await db.collection('projetos').doc(id).set(data);
    setSyncStatus('ok');
  }catch(e){ saveToLocal(); setSyncStatus('error'); }
}
function saveToLocal(){ try{ localStorage.setItem('arias_proj_local',JSON.stringify(projects)); }catch(e){} }
function loadFromLocal(){ try{ const r=localStorage.getItem('arias_proj_local'); if(r) projects=JSON.parse(r); }catch(e){} }

function getProj(id,aba){
  if(!projects[id]) projects[id]={etapa:(ETAPAS[aba]||ETAPAS.outros)[0].id,notas:'',historico:[],aba};
  return projects[id];
}
async function persistProj(id){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveToCloud(id,projects[id]),600);
}

// ── SERVIÇO → ABA ──
function servicoAba(s){
  if(!s) return 'outros';
  const l=s.toLowerCase();
  if(l.includes('georreferenciamento')) return 'geo';
  if(l.includes('topografia')) return 'topo';
  if(l.includes('laudo')||l.includes('assessoria')||l.includes('defesa')||l.includes('calibr')) return 'md';
  return 'outros';
}

// ── INIT APP ──
async function initApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('loading-bar').style.display='block';
  const fbOk=initFirebase();
  await loadFromCloud();
  await fetchGeoJSON();
  const mapEl=document.getElementById('map');
  if(mapEl&&!mapEl._leaflet_id){
    window._map=L.map('map').setView([-15.78,-47.93],4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(window._map);
    window._map.on('click',()=>closeDetail());
  }
  renderMap(); renderOrc();
  ['md','geo','topo','outros'].forEach(a=>renderMgmt(a));
  if(allFeatures.length>0) fitBounds();
}

async function fetchGeoJSON(){
  try{
    const r=await fetch(GEOJSON_URL);
    if(!r.ok) throw new Error('HTTP '+r.status);
    process(await r.json());
  }catch(e){
    process(getDemoGeoJSON());
    document.getElementById('count-pill').textContent='⚠ demo';
  }finally{
    document.getElementById('loading-bar').style.display='none';
  }
}
function process(gj){
  allFeatures=(gj.features||[]).filter(f=>f.geometry&&f.geometry.type==='Point');
  const n=allFeatures.length, won=allFeatures.filter(f=>f.properties.status==='won').length;
  document.getElementById('count-pill').textContent=n+' cliente'+(n!==1?'s':'');
  document.getElementById('orc-sub').textContent=`${n} empresas · ${won} ganhos`;
}

// ── VIEWS ──
function showView(v){
  ['mapa','orc','md','geo','topo','outros'].forEach(id=>{
    const el=document.getElementById('view-'+id);
    if(!el) return;
    el.style.display='none'; el.classList.remove('active');
    document.getElementById('nav-'+id)?.classList.remove('active');
  });
  const t=document.getElementById('view-'+v);
  if(t){ t.style.display='flex'; if(v!=='mapa') t.classList.add('active'); }
  document.getElementById('nav-'+v)?.classList.add('active');
  document.getElementById('filter-bar').style.display=v==='mapa'?'flex':'none';
  if(v==='mapa') setTimeout(()=>window._map?.invalidateSize(),50);
}

// ── FILTROS ──
function toggleStatus(s){ activeStatus.has(s)?activeStatus.delete(s):activeStatus.add(s); document.getElementById('chip-'+s).classList.toggle('active',activeStatus.has(s)); renderMap(); }
function toggleServico(s){ const ids={md:'chip-md',geo:'chip-geo',topo:'chip-topo',outros:'chip-out'}; activeServico.has(s)?activeServico.delete(s):activeServico.add(s); document.getElementById(ids[s])?.classList.toggle('active',activeServico.has(s)); renderMap(); }
function clearFilters(){ activeStatus.clear(); activeServico.clear(); ['won','sent','neg','lost'].forEach(s=>document.getElementById('chip-'+s)?.classList.remove('active')); ['chip-md','chip-geo','chip-topo','chip-out'].forEach(id=>document.getElementById(id)?.classList.remove('active')); renderMap(); }
function filteredFeatures(){ return allFeatures.filter(f=>{ const p=f.properties; return (activeStatus.size===0||activeStatus.has(p.status))&&(activeServico.size===0||activeServico.has(servicoAba(p.servico))); }); }

// ── MAPA ──
function makeIcon(status){ const c=STATUS_COLOR[status]||'#888'; const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34"><path d="M13 0C5.82 0 0 5.82 0 13c0 8.67 13 21 13 21S26 21.67 26 13C26 5.82 20.18 0 13 0z" fill="${c}"/><circle cx="13" cy="13" r="5.5" fill="rgba(255,255,255,.88)"/></svg>`; return L.divIcon({html:`<div style="width:26px;height:34px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.5))">${svg}</div>`,iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-34],className:''}); }

function renderMap(){
  if(!window._map) return;
  markers.forEach(m=>window._map.removeLayer(m)); markers=[];
  const fc=filteredFeatures();
  fc.forEach(f=>{
    const p=f.properties; const [lng,lat]=f.geometry.coordinates;
    const m=L.marker([lat,lng],{icon:makeIcon(p.status)});
    m.bindTooltip(`<div style="font-family:'DM Sans',sans-serif"><b>${p.empresa||'—'}</b><br><span style="color:#7c8099">${p.cidade||''}${p.estado?', '+p.estado:''}</span></div>`,{className:'ctt',direction:'top',offset:[0,-4]});
    m.on('click',()=>openMapDetail(f));
    m.addTo(window._map); markers.push(m);
  });
  const list=document.getElementById('sb-list');
  list.innerHTML=fc.length===0?`<div class="empty-state"><div class="empty-icon">🔍</div>Nenhum resultado</div>`:fc.map(f=>{const p=f.properties;const id=fid(f);return `<div class="ci ${activeMapId===id?'active':''}" id="mi-${id}" onclick='openMapDetail(${JSON.stringify(f).replace(/'/g,"&#39;")})'>
    <div class="ci-av">${ini(p.empresa||'?')}</div>
    <div class="ci-info"><div class="ci-name">${p.empresa||'—'}</div><div class="ci-sub">${p.cidade||''}${p.estado?', '+p.estado:''}</div></div>
    <div class="sdot ${p.status||'sent'}"></div></div>`;}).join('');
  document.getElementById('sb-count').textContent=fc.length;
  document.getElementById('s-total').textContent=fc.length;
  document.getElementById('s-won').textContent=fc.filter(f=>f.properties.status==='won').length;
  const v=fc.reduce((a,f)=>a+(parseFloat(f.properties.valor)||0),0);
  document.getElementById('s-valor').textContent=v>=1000?'R$'+(v/1000).toFixed(0)+'k':'R$'+v.toFixed(0);
}

function openMapDetail(f){
  const p=f.properties; const id=fid(f);
  activeMapId=id;
  document.querySelectorAll('.ci').forEach(el=>el.classList.remove('active'));
  const item=document.getElementById('mi-'+id);
  if(item){item.classList.add('active');item.scrollIntoView({block:'nearest'});}
  const [lng,lat]=f.geometry.coordinates;
  window._map?.flyTo([lat,lng],Math.max(window._map.getZoom(),10),{duration:.8});
  const aba=servicoAba(p.servico); const proj=getProj(id,aba);
  const etapa=(ETAPAS[aba]||ETAPAS.outros).find(e=>e.id===proj.etapa)||(ETAPAS[aba]||ETAPAS.outros)[0];
  document.getElementById('detail-panel').innerHTML=`
    <div class="dp-hd"><div class="dp-av">${ini(p.empresa||'?')}</div>
      <div style="flex:1;min-width:0"><div class="dp-name">${p.empresa||'—'}</div><div class="dp-loc">📍 ${p.cidade||''}${p.estado?', '+p.estado:''}</div></div>
      <button class="dp-x" onclick="closeDetail()">✕</button></div>
    <div class="dp-body">
      ${p.fid?`<div class="dp-row"><span class="dp-lbl">FID</span><span class="dp-val" style="font-family:'DM Mono',monospace;font-size:11px">${p.fid}</span></div>`:''}
      ${p.CPF_CNPJ?`<div class="dp-row"><span class="dp-lbl">CPF/CNPJ</span><span class="dp-val" style="font-family:'DM Mono',monospace;font-size:11px">${p.CPF_CNPJ}</span></div>`:''}
      <hr class="dp-div"/>
      <div class="dp-row"><span class="dp-lbl">Orçamento</span><span class="sbadge ${p.status||'sent'}">${STATUS_LABEL[p.status]||p.status}</span></div>
      ${p.servico?`<div class="dp-row"><span class="dp-lbl">Serviço</span><span class="dp-val">${p.servico}</span></div>`:''}
      ${p.data_proposta?`<div class="dp-row"><span class="dp-lbl">Data proposta</span><span class="dp-val">${fmtD(p.data_proposta)}</span></div>`:''}
      ${p.valor?`<div class="dp-row"><span class="dp-lbl">Valor</span><span class="dp-val">${fmtV(p.valor)}</span></div>`:''}
      <hr class="dp-div"/>
      ${p.contato?`<div class="dp-row"><span class="dp-lbl">Contato</span><span class="dp-val">${p.contato}</span></div>`:''}
      ${p.telefone?`<div class="dp-row"><span class="dp-lbl">Telefone</span><span class="dp-val" style="font-family:'DM Mono',monospace;font-size:11px">${p.telefone}</span></div>`:''}
      ${p.email?`<div class="dp-row"><span class="dp-lbl">Email</span><span class="dp-val" style="color:var(--sent);font-size:11px">${p.email}</span></div>`:''}
      ${p.pdf_link?`<hr class="dp-div"/><div class="dp-row"><span class="dp-lbl">Proposta</span><a class="pdf-a" href="${p.pdf_link}" target="_blank">↗ PDF</a></div>`:''}
      ${p.observacoes?`<hr class="dp-div"/><div class="dp-note">${p.observacoes}</div>`:''}
      ${p.status==='won'?`<hr class="dp-div"/>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Etapa atual</div>
        <div style="display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)">
          <div style="width:7px;height:7px;border-radius:50%;background:${etapa.cor}"></div>
          <span style="font-size:12px;font-weight:500">${etapa.nome}</span>
        </div>
        <button class="goto-btn" onclick="showView('${aba}');setTimeout(()=>openProjDetail('${id}','${aba}'),80)">📋 Gerenciar projeto →</button>`:''}
    </div>`;
  document.getElementById('detail-panel').classList.add('open');
}
function closeDetail(){ document.getElementById('detail-panel').classList.remove('open'); document.querySelectorAll('.ci').forEach(el=>el.classList.remove('active')); activeMapId=null; }
function fitBounds(){ const c=allFeatures.map(f=>[f.geometry.coordinates[1],f.geometry.coordinates[0]]); if(c.length===1){window._map?.setView(c[0],10);return;} window._map?.fitBounds(L.latLngBounds(c),{padding:[40,40]}); }

// ── ORÇAMENTOS ──
function renderOrc(){
  const q=(document.getElementById('orc-search')?.value||'').toLowerCase();
  const ft=allFeatures.filter(f=>!q||(f.properties.empresa||'').toLowerCase().includes(q));
  document.getElementById('kanban-orc').innerHTML=ORC_COLS.map(col=>{
    const cards=ft.filter(f=>f.properties.status===col.id);
    return `<div class="kol"><div class="kol-hd"><div class="kol-dot" style="background:${col.cor}"></div><span class="kol-name">${col.nome}</span><span class="kol-cnt">${cards.length}</span></div>
      <div class="kol-cards">${cards.map(f=>{const p=f.properties;const id=fid(f);return `<div class="kard ${activeProjIds.orc===id?'sel':''}" onclick="openOrcDetail('${id}')">
        <div class="kard-name">${p.empresa||'—'}</div>
        <div class="kard-meta">${p.cidade||''}${p.estado?', '+p.estado:''}<br>${p.contato||''}</div>
        ${p.servico?`<div class="kard-tag">${p.servico}</div>`:''}
        ${p.valor?`<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:5px">${fmtV(p.valor)}</div>`:''}
        ${p.data_proposta?`<div style="font-size:10px;color:var(--muted);margin-top:2px">${fmtD(p.data_proposta)}</div>`:''}
      </div>`;}).join('')||'<div style="height:40px"></div>'}</div></div>`;
  }).join('');
}
function openOrcDetail(id){ activeProjIds.orc=id; const f=allFeatures.find(f=>fid(f)===id); if(!f) return; const aba=servicoAba(f.properties.servico); document.getElementById('orc-detail').innerHTML=buildDetailHTML(f,aba,'orc'); document.getElementById('orc-detail').classList.add('open'); renderOrc(); }

// ── GESTÃO KANBAN ──
function renderMgmt(aba){
  const q=(document.getElementById(aba+'-search')?.value||'').toLowerCase();
  const ft=allFeatures.filter(f=>f.properties.status==='won'&&servicoAba(f.properties.servico)===aba&&(!q||(f.properties.empresa||'').toLowerCase().includes(q)));
  const etapas=ETAPAS[aba]||ETAPAS.outros;
  const sub=document.getElementById(aba+'-sub'); if(sub) sub.textContent=`${ft.length} projeto${ft.length!==1?'s':''}`;
  document.getElementById('kanban-'+aba).innerHTML=etapas.map((etapa,ei)=>{
    const cards=ft.filter(f=>getProj(fid(f),aba).etapa===etapa.id);
    return `<div class="kol"><div class="kol-hd"><div class="kol-dot" style="background:${etapa.cor}"></div><span class="kol-name">${etapa.nome}</span><span class="kol-cnt">${cards.length}</span></div>
      <div class="kol-cards">${cards.map(f=>{const p=f.properties;const id=fid(f);const proj=getProj(id,aba);const ei2=etapas.findIndex(e=>e.id===proj.etapa);const dias=proj.historico?.length>0?Math.floor((Date.now()-new Date(proj.historico[0].data))/86400000):0;
        return `<div class="kard ${activeProjIds[aba]===id?'sel':''}" onclick="openProjDetail('${id}','${aba}')" style="border-left-color:${etapa.cor}">
          <div class="kard-name">${p.empresa||'—'}</div>
          <div class="kard-meta">${p.cidade||''}${p.estado?', '+p.estado:''}<br>${p.contato||''}</div>
          ${p.servico?`<div class="kard-tag">${p.servico}</div>`:''}
          <div class="kard-footer"><span class="kard-days">${dias>0?dias+'d':''}</span>
            <div class="mbts">
              ${ei2>0?`<button class="mbt" onclick="moveEtapa(event,'${id}','${aba}',-1)">←</button>`:''}
              ${ei2<etapas.length-1?`<button class="mbt" onclick="moveEtapa(event,'${id}','${aba}',1)">→</button>`:''}
            </div>
          </div>
        </div>`;}).join('')||'<div style="height:40px"></div>'}</div></div>`;
  }).join('');
}
function moveEtapa(e,id,aba,dir){ e.stopPropagation(); const proj=getProj(id,aba); const etapas=ETAPAS[aba]||ETAPAS.outros; const idx=etapas.findIndex(et=>et.id===proj.etapa); const ni=Math.max(0,Math.min(etapas.length-1,idx+dir)); if(ni===idx) return; proj.etapa=etapas[ni].id; proj.historico=proj.historico||[]; proj.historico.push({etapa:proj.etapa,data:new Date().toISOString()}); persistProj(id); renderMgmt(aba); if(activeProjIds[aba]===id) openProjDetail(id,aba); }
function openProjDetail(id,aba){ activeProjIds[aba]=id; const f=allFeatures.find(f=>fid(f)===id); if(!f) return; const el=document.getElementById(aba+'-detail'); if(!el) return; el.innerHTML=buildDetailHTML(f,aba,aba); el.classList.add('open'); renderMgmt(aba); }
function closeProjDetail(key){ const el=document.getElementById(key+'-detail'); if(el) el.classList.remove('open'); activeProjIds[key]=null; if(key!=='orc') renderMgmt(key); else renderOrc(); }

function buildDetailHTML(f,aba,key){
  const p=f.properties; const id=fid(f);
  const etapas=aba!=='orc'?(ETAPAS[aba]||ETAPAS.outros):null;
  const proj=etapas?getProj(id,aba):null;
  const etapaAtualIdx=proj?etapas.findIndex(e=>e.id===proj.etapa):0;
  const timeline=etapas?etapas.map((et,i)=>{
    const isDone=i<etapaAtualIdx,isCur=i===etapaAtualIdx;
    const hist=proj.historico?.find(h=>h.etapa===et.id);
    return `<div class="tl-row" onclick="setEtapaDirect('${id}','${aba}',${i})">
      <div class="tl-line"><div class="tl-circle ${isDone?'done':isCur?'cur':''}">${isDone?'<span class="ck">✓</span>':isCur?`<div style="width:5px;height:5px;border-radius:50%;background:var(--sent)"></div>`:''}</div>${i<etapas.length-1?`<div class="tl-conn ${isDone?'done':''}"></div>`:''}</div>
      <div class="tl-label"><div class="tl-name ${isDone?'done':isCur?'cur':''}">${et.nome}</div>${hist?`<div class="tl-date">${fmtD(hist.data.split('T')[0])}</div>`:''}</div>
    </div>`;}).join(''):'';
  return `<div class="pd-hd"><div class="pd-top"><div class="pd-av">${ini(p.empresa||'?')}</div>
    <div style="flex:1;min-width:0"><div class="pd-name">${p.empresa||'—'}</div><div class="pd-loc">📍 ${p.cidade||''}${p.estado?', '+p.estado:''}</div></div>
    <button class="pd-x" onclick="closeProjDetail('${key}')">✕</button></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap"><span class="sbadge ${p.status||'sent'}">${STATUS_LABEL[p.status]||'—'}</span>${p.servico?`<span style="padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500;background:var(--surface3);color:var(--muted2);border:1px solid var(--border)">${p.servico}</span>`:''}</div></div>
  <div class="pd-body">
    ${p.fid?`<div class="pd-row"><span class="pd-lbl">FID</span><span class="pd-val" style="font-family:'DM Mono',monospace;font-size:11px">${p.fid}</span></div>`:''}
    ${p.CPF_CNPJ?`<div class="pd-row"><span class="pd-lbl">CPF/CNPJ</span><span class="pd-val" style="font-family:'DM Mono',monospace;font-size:11px">${p.CPF_CNPJ}</span></div>`:''}
    ${p.cidade?`<div class="pd-row"><span class="pd-lbl">Cidade</span><span class="pd-val">${p.cidade}${p.estado?', '+p.estado:''}</span></div>`:''}
    ${p.contato?`<div class="pd-row"><span class="pd-lbl">Contato</span><span class="pd-val">${p.contato}</span></div>`:''}
    ${p.telefone?`<div class="pd-row"><span class="pd-lbl">Telefone</span><span class="pd-val" style="font-family:'DM Mono',monospace;font-size:11px">${p.telefone}</span></div>`:''}
    ${p.email?`<div class="pd-row"><span class="pd-lbl">Email</span><span class="pd-val" style="color:var(--sent);font-size:11px">${p.email}</span></div>`:''}
    ${p.data_proposta?`<div class="pd-row"><span class="pd-lbl">Data proposta</span><span class="pd-val">${fmtD(p.data_proposta)}</span></div>`:''}
    ${p.valor?`<div class="pd-row"><span class="pd-lbl">Valor</span><span class="pd-val">${fmtV(p.valor)}</span></div>`:''}
    ${p.pdf_link?`<div class="pd-row"><span class="pd-lbl">Proposta</span><a class="pdf-a" href="${p.pdf_link}" target="_blank">↗ PDF</a></div>`:''}
    ${p.observacoes?`<div style="background:var(--surface2);border-radius:8px;padding:7px 9px;font-size:11px;color:var(--muted);line-height:1.6">${p.observacoes}</div>`:''}
    ${etapas?`<hr style="border:none;border-top:1px solid var(--border)"/>
      <div class="pd-section">Progresso</div><div class="tl">${timeline}</div>
      <hr style="border:none;border-top:1px solid var(--border)"/>
      <div class="pd-section">Alterar etapa</div>
      <div class="etapa-sel-row"><select class="etapa-sel" id="esel-${id}-${aba}">${etapas.map(et=>`<option value="${et.id}" ${proj.etapa===et.id?'selected':''}>${et.nome}</option>`).join('')}</select>
      <button class="etapa-save" onclick="saveEtapa('${id}','${aba}')">OK</button></div>
      <hr style="border:none;border-top:1px solid var(--border)"/>
      <div class="pd-section">Notas</div>
      <textarea class="notes-ta" id="nta-${id}-${aba}" placeholder="Anotações internas…">${proj.notas||''}</textarea>
      <button class="notes-save" onclick="saveNotes('${id}','${aba}')">Salvar notas</button>`:''}
  </div>`;
}
function saveEtapa(id,aba){ const sel=document.getElementById(`esel-${id}-${aba}`); if(!sel) return; const proj=getProj(id,aba); if(proj.etapa===sel.value) return; proj.etapa=sel.value; proj.historico=proj.historico||[]; proj.historico.push({etapa:proj.etapa,data:new Date().toISOString()}); persistProj(id); openProjDetail(id,aba); }
function setEtapaDirect(id,aba,idx){ const etapas=ETAPAS[aba]||ETAPAS.outros; const proj=getProj(id,aba); if(proj.etapa===etapas[idx].id) return; proj.etapa=etapas[idx].id; proj.historico=proj.historico||[]; proj.historico.push({etapa:proj.etapa,data:new Date().toISOString()}); persistProj(id); openProjDetail(id,aba); }
function saveNotes(id,aba){ const ta=document.getElementById(`nta-${id}-${aba}`); if(!ta) return; getProj(id,aba).notas=ta.value; persistProj(id); ta.style.borderColor='var(--accent)'; setTimeout(()=>ta.style.borderColor='',1400); }

// ── UTILS ──
function fid(f){ const p=f.properties; return btoa(encodeURIComponent((p.fid||p.empresa||'')+'_'+(f.geometry.coordinates||[]).join('_'))).replace(/[=+/]/g,'_'); }
function ini(n){ return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function fmtV(n){ return n?'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—'; }
function fmtD(s){ if(!s) return '—'; try{ return new Date(s.includes('T')?s:s+'T00:00:00').toLocaleDateString('pt-BR'); }catch(e){ return s; } }
